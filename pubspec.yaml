name: lunar_calendar
description: "Lunar calendar app with fortune, Google Calendar sync, and push notifications."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.4

  # Google Sign-In & Calendar
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  http: ^1.2.2

  # Navigation
  go_router: ^14.6.2

  # Lunar calendar calculation
  lunar: ^1.4.0

  # Calendar UI
  table_calendar: ^3.1.3

  # State management
  flutter_riverpod: ^2.6.1

  # AI & utilities
  google_generative_ai: ^0.4.7
  shared_preferences: ^2.5.5
  flutter_dotenv: ^6.0.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

  # Home widget
  home_widget: ^0.9.0
  google_mobile_ads: ^7.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  in_app_review: ^2.0.11
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
